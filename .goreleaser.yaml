version: 2

project_name: canopy

before:
  hooks:
    - go mod tidy

builds:
  - main: ./cmd/canopy
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - id: canopy
    name_template: "canopy_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    files:
      - README.md
      - LICENSE
      - src: cmd/canopy/config.example.yaml
        strip_parent: true

checksum:
  name_template: "canopy_{{ .Version }}_checksums.txt"
  algorithm: sha256

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - '^docs:'
      - '^chore:'
      - '^ci:'
      - Merge pull request
      - Merge branch

release:
  github:
    owner: alcxyz
    name: canopy
  draft: false
  prerelease: auto

brews:
  - name: canopy
    repository:
      owner: alcxyz
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: https://github.com/alcxyz/canopy
    description: "Terminal UI for tracking tasks across work management backends"
    license: MIT
    install: |
      bin.install "canopy"
